services:
  backend:
    image: rust:1-bookworm
    working_dir: /app/backend
    command: cargo run
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      AUTH_SECRET: development-secret-change-me
      RUST_LOG: backend=info
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
      - backend-target:/app/backend/target

  frontend:
    image: node:24-bookworm
    working_dir: /app/frontend
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - backend

volumes:
  backend-target:
  frontend-node-modules:
  pnpm-store:
